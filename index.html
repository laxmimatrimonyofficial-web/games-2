<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breakout</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-border-secondary: #d1d5db;
  --color-background-secondary: #f9fafb;
  --font-mono: 'Courier New', monospace;
  --border-radius-md: 8px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-text-primary: #f3f4f6;
    --color-text-secondary: #9ca3af;
    --color-border-secondary: #374151;
    --color-background-secondary: #111827;
  }
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--color-background-secondary);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow-x: hidden;
}

#game-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0;
  font-family: var(--font-mono, monospace);
  width: 100%;
  max-width: 560px;
}

#hud {
  display: flex;
  gap: 2rem;
  margin-bottom: 0.75rem;
  font-size: 13px;
  color: var(--color-text-secondary);
  letter-spacing: 0.05em;
}
#hud span { color: var(--color-text-primary); font-weight: 500; }

#canvas {
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  display: block;
  cursor: none;
  background: var(--color-background-secondary);
  max-width: 100%;
  touch-action: none;
}

#bottom-bar {
  margin-top: 0.75rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 1rem;
}

#msg {
  font-size: 13px;
  color: var(--color-text-secondary);
  min-height: 20px;
  letter-spacing: 0.03em;
  text-align: center;
}

#sound-btn {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: transparent;
  color: var(--color-text-secondary);
  cursor: pointer;
}
#sound-btn:hover { background: var(--color-background-secondary); }

/* Mobile tap-to-launch hint */
#mobile-hint {
  display: none;
  font-size: 11px;
  color: var(--color-text-secondary);
  margin-top: 0.4rem;
  letter-spacing: 0.03em;
}
@media (pointer: coarse) {
  #mobile-hint { display: block; }
  body { cursor: default; }
  #canvas { cursor: default; }
}
</style>
</head>
<body>
<div id="game-wrap">
  <div id="hud">
    SCORE <span id="score">0</span> &nbsp;|&nbsp; LIVES <span id="lives">3</span> &nbsp;|&nbsp; LEVEL <span id="level">1</span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="bottom-bar">
    <div id="msg">Tap or press Space to start</div>
    <button id="sound-btn">🔊 Sound ON</button>
  </div>
  <div id="mobile-hint">Drag finger to move paddle</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// --- Responsive sizing ---
function getScale() {
  const maxW = Math.min(window.innerWidth - 16, 520);
  return maxW / 520;
}

const BASE_W = 520, BASE_H = 380;
let scale = 1;

function resizeCanvas() {
  scale = getScale();
  canvas.width = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const W = BASE_W, H = BASE_H;

const PADDLE_W = 80, PADDLE_H = 10, PADDLE_Y = H - 30;
const BALL_R = 7;
const BRICK_ROWS = 5, BRICK_COLS = 10;
const BRICK_W = 44, BRICK_H = 16, BRICK_GAP = 4;
const BRICK_OFF_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;
const BRICK_OFF_Y = 50;

const COLORS = ['#E24B4A','#EF9F27','#1D9E75','#378ADD','#7F77DD','#D4537E'];
const STRONG_COLORS = ['#A32D2D','#BA7517','#0F6E56','#185FA5','#534AB7','#993556'];

let audioCtx = null;
let soundOn = true;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, gainVal, when) {
  if (!soundOn) return;
  try {
    const ac = getAudio();
    const t = when ?? ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(gainVal, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.start(t);
    osc.stop(t + duration);
  } catch(e) {}
}

function soundPaddle() { playTone(220, 'sine', 0.08, 0.3); }
function soundBrickHit() { playTone(440, 'square', 0.07, 0.15); }
function soundBrickBreak() {
  try {
    if (!soundOn) return;
    const ac = getAudio();
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(150, t + 0.15);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  } catch(e) {}
}
function soundWall() { playTone(180, 'sine', 0.06, 0.15); }
function soundLoseLife() {
  try {
    if (!soundOn) return;
    const ac = getAudio();
    const t = ac.currentTime;
    [300, 220, 150].forEach((f, i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, t + i*0.12);
      g.gain.setValueAtTime(0.3, t + i*0.12);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i*0.12 + 0.11);
      osc.start(t + i*0.12); osc.stop(t + i*0.12 + 0.11);
    });
  } catch(e) {}
}
function soundWin() {
  try {
    if (!soundOn) return;
    const ac = getAudio();
    const t = ac.currentTime;
    [440,550,660,880].forEach((f,i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, t + i*0.1);
      g.gain.setValueAtValue(0.25, t + i*0.1);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i*0.1 + 0.12);
      osc.start(t + i*0.1); osc.stop(t + i*0.1 + 0.12);
    });
  } catch(e) {}
}
function soundGameOver() {
  try {
    if (!soundOn) return;
    const ac = getAudio();
    const t = ac.currentTime;
    [300,250,200,150].forEach((f,i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(f, t + i*0.13);
      g.gain.setValueAtTime(0.2, t + i*0.13);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i*0.13 + 0.12);
      osc.start(t + i*0.13); osc.stop(t + i*0.13 + 0.12);
    });
  } catch(e) {}
}

let state = 'idle';
let score = 0, lives = 3, level = 1;
let paddle = { x: W/2 - PADDLE_W/2 };
let ball = {};
let bricks = [];
let particles = [];

function resetBall() {
  ball = { x: W/2, y: PADDLE_Y - BALL_R - 2, dx: 0, dy: 0, active: false };
}

function makeBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const hp = r < 2 ? 2 : 1;
      bricks.push({
        x: BRICK_OFF_X + c * (BRICK_W + BRICK_GAP),
        y: BRICK_OFF_Y + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        hp, maxHp: hp,
        color: COLORS[r % COLORS.length],
        scolor: STRONG_COLORS[r % COLORS.length],
        alive: true
      });
    }
  }
}

function launchBall() {
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.8;
  const speed = 4 + level * 0.4;
  ball.dx = Math.cos(angle) * speed;
  ball.dy = Math.sin(angle) * speed;
  ball.active = true;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random() * 2.5;
    particles.push({ x, y, dx: Math.cos(a)*s, dy: Math.sin(a)*s, life: 1, color });
  }
}

function reset() {
  makeBricks();
  resetBall();
  state = 'ready';
  document.getElementById('msg').textContent = 'Tap or Space to launch';
}

function init() {
  score = 0; lives = 3; level = 1;
  updateHUD();
  reset();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = level;
}

function drawRoundRect(x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fillStyle = fill;
  ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const paddleColor = isDark ? '#AFA9EC' : '#534AB7';
  const ballColor = isDark ? '#5DCAA5' : '#0F6E56';

  bricks.forEach(b => {
    if (!b.alive) return;
    const c = b.hp === b.maxHp ? b.color : b.scolor;
    drawRoundRect(b.x, b.y, b.w, b.h, 3, c);
    if (b.maxHp > 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(b.hp, b.x + b.w/2, b.y + b.h/2 + 3);
    }
  });

  drawRoundRect(paddle.x, PADDLE_Y, PADDLE_W, PADDLE_H, 5, paddleColor);

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
  ctx.fillStyle = ballColor;
  ctx.fill();

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3*p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = '500 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 16);
    ctx.font = '13px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Score: ' + score + '  —  Tap or Space to restart', W/2, H/2 + 14);
  }

  if (state === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#5DCAA5';
    ctx.font = '500 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WIN!', W/2, H/2 - 16);
    ctx.font = '13px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Score: ' + score + '  —  Tap or Space for next level', W/2, H/2 + 14);
  }
}

function update() {
  if (!ball.active) return;

  ball.x += ball.dx;
  ball.y += ball.dy;

  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); soundWall(); }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.dx = -Math.abs(ball.dx); soundWall(); }
  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.dy = Math.abs(ball.dy); soundWall(); }

  if (ball.y + BALL_R > PADDLE_Y && ball.y + BALL_R < PADDLE_Y + PADDLE_H + 4 &&
      ball.x > paddle.x - 4 && ball.x < paddle.x + PADDLE_W + 4) {
    ball.y = PADDLE_Y - BALL_R;
    const hit = (ball.x - (paddle.x + PADDLE_W/2)) / (PADDLE_W/2);
    const angle = hit * 1.1;
    const speed = Math.sqrt(ball.dx**2 + ball.dy**2);
    ball.dx = Math.sin(angle) * speed;
    ball.dy = -Math.abs(Math.cos(angle) * speed);
    soundPaddle();
  }

  if (ball.y > H + 20) {
    lives--;
    updateHUD();
    soundLoseLife();
    if (lives <= 0) {
      state = 'over';
      document.getElementById('msg').textContent = '';
      ball.active = false;
      soundGameOver();
    } else {
      resetBall();
      state = 'ready';
      document.getElementById('msg').textContent = 'Tap or Space to launch';
    }
    return;
  }

  for (let b of bricks) {
    if (!b.alive) continue;
    if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
        ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        score += 10 * level;
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
        soundBrickBreak();
      } else {
        score += 5 * level;
        soundBrickHit();
      }
      updateHUD();
      const overlapL = ball.x + BALL_R - b.x;
      const overlapR = b.x + b.w - (ball.x - BALL_R);
      const overlapT = ball.y + BALL_R - b.y;
      const overlapB = b.y + b.h - (ball.y - BALL_R);
      const minH = Math.min(overlapL, overlapR);
      const minV = Math.min(overlapT, overlapB);
      if (minH < minV) ball.dx = -ball.dx;
      else ball.dy = -ball.dy;
      break;
    }
  }

  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    p.dy += 0.08;
    p.life -= 0.04;
  });
  particles = particles.filter(p => p.life > 0);

  const alive = bricks.filter(b => b.alive).length;
  if (alive === 0) {
    ball.active = false;
    state = 'win';
    document.getElementById('msg').textContent = '';
    soundWin();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Mouse control
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / scale;
  paddle.x = Math.max(0, Math.min(W - PADDLE_W, mx - PADDLE_W/2));
  if (!ball.active && state === 'ready') ball.x = paddle.x + PADDLE_W/2;
});

// Touch control — drag moves paddle; tap launches
let lastTouchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) / scale;
  lastTouchX = tx;
  paddle.x = Math.max(0, Math.min(W - PADDLE_W, tx - PADDLE_W/2));
  if (!ball.active && state === 'ready') ball.x = paddle.x + PADDLE_W/2;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) / scale;
  paddle.x = Math.max(0, Math.min(W - PADDLE_W, tx - PADDLE_W/2));
  if (!ball.active && state === 'ready') ball.x = paddle.x + PADDLE_W/2;
  lastTouchX = tx;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  // Treat tap (no significant movement) as action
  action();
}, { passive: false });

function action() {
  if (state === 'ready') { launchBall(); document.getElementById('msg').textContent = ''; }
  else if (state === 'over') { lives = 3; score = 0; level = 1; updateHUD(); reset(); }
  else if (state === 'win') { level++; updateHUD(); reset(); }
}

canvas.addEventListener('click', action);
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); action(); } });

const soundBtn = document.getElementById('sound-btn');
soundBtn.addEventListener('click', e => {
  e.stopPropagation();
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊 Sound ON' : '🔇 Sound OFF';
});

init();
loop();
</script>
</body>
</html>
