<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dash Runner</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9143865157586788" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0018;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: manipulation;
    user-select: none;
  }

  #gameWrapper {
    position: relative;
    flex-shrink: 0;
    user-select: none;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(124,58,237,0.3);
  }

  #gameCanvas {
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(124,58,237,0.4);
    touch-action: manipulation;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
  }

  .btn-primary {
    padding: 14px 32px;
    font-size: 18px;
    font-weight: 600;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    min-width: 160px;
  }
  .btn-primary:active { background: #6d28d9; transform: scale(0.95); }

  /* Other buttons */
  .btn-outline, .btn-gold, .btn-ghost {
    padding: 12px 24px;
    font-size: 16px;
    border-radius: 12px;
  }

  #hud, #powerupHud {
    pointer-events: none;
    text-shadow: 0 2px 6px #000;
  }

  .indicator {
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 20px;
    background: rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- All your original overlays remain exactly the same -->
  <!-- Menu, Game Over, Skin Shop, etc. -->
  <div id="menuScreen" class="overlay" style="background: linear-gradient(180deg, #1a0a3d 0%, #2d1b69 50%, #1a0a3d 100%);">
    <!-- ... your original menu content ... -->
    <div id="menuTitle" style="font-weight:700;color:#fff;letter-spacing:2px;text-shadow:0 0 20px #a78bfa;">DASH RUNNER</div>
    <div id="menuSub" style="color:#c4b5fd;margin:8px 0 24px;">Collect coins. Dodge obstacles. Go forever.</div>
    <div id="skinPicker" style="display:flex;gap:12px;margin-bottom:20px;"></div>
    <div style="display:flex;gap:12px;margin-bottom:12px;">
      <button class="btn-primary" onclick="startGame()">Play</button>
      <button class="btn-outline" onclick="showSkins()">Skins</button>
    </div>
    <div id="menuStats" style="color:#a78bfa;">Best: <span id="menuBest">0</span> | Coins: <span id="menuCoins">0</span></div>
  </div>

  <!-- Keep all your other overlays (gameOverScreen, adScreen, skinShop, hud, powerupHud) exactly as they were -->
  <!-- ... paste them here ... -->
</div>

<script>
// ─── RESPONSIVE + MOBILE OPTIMIZED SIZING ─────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: true });

let W, H, SCALE, GROUND;
const BASE_W = 680, BASE_H = 320;

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let cw, ch;
  const aspect = BASE_W / BASE_H;

  if (vw / vh > aspect) {
    ch = Math.min(vh * 0.92, BASE_H);
    cw = ch * aspect;
  } else {
    cw = Math.min(vw - 16, BASE_W);
    ch = cw / aspect;
  }

  cw = Math.floor(cw);
  ch = Math.floor(ch);

  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';

  W = cw;
  H = ch;
  SCALE = cw / BASE_W;
  GROUND = H - 55 * SCALE;
}

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 150));

// Rest of your original game code (unchanged except for controls)
let player, obstacles = [], coins = [], powerups = [], particles = [], bgStars;
let gameSpeed = 3.5, frameCount = 0, isOnGround = true;
let activePowerup = null, powerupTimer = 0;
let state = { /* your original state */ };

// ... (Keep all your original functions: initGame, startGame, update, draw, etc.) ...

// ─── ENHANCED MOBILE CONTROLS ─────────────────────────────────────────────
function jump() {
  if (state.screen !== 'game') return;
  if (isOnGround) {
    player.vy = -13.5 * SCALE;
    isOnGround = false;
    spawnParticles(player.x + player.w/2, player.y + player.h, '#c4b5fd', 8);
  }
}

// Click + Tap
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  jump();
}, { passive: false });

// Swipe Up Support (better mobile feel)
let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const touchEndY = e.changedTouches[0].screenY;
  if (touchStartY - touchEndY > 50) { // swipe up
    jump();
  }
}, { passive: true });

// Keyboard (for desktop testing)
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

// Initialize
resize();
showMenu(); // your original function
</script>
</body>
</html>
